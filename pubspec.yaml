name: ditonton
description: Aplikasi katalog film dan serial TV.
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  dartz: ^0.10.1
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.4.1
  get_it: ^8.0.3
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  flutter_dotenv: ^5.2.1

dev_dependencies:
  mockito: ^5.4.5
  build_runner: ^2.4.14
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
